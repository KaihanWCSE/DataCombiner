<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DataCombiner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      margin-bottom: 8px;
    }

    .description {
      color: #555;
      margin-bottom: 24px;
    }

    input, select, button {
      margin-top: 12px;
      display: block;
    }

    label {
      margin-top: 16px;
      display: block;
      font-weight: bold;
    }

    select {
      padding: 6px;
      min-width: 220px;
    }

    button {
      padding: 8px 16px;
      cursor: pointer;
    }

    table {
      border-collapse: collapse;
      margin-top: 24px;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #f2f2f2;
    }

    #status {
      margin-top: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>DataCombiner</h1>

  <p class="description">
    Upload multiple CSV or XLSX files, choose a shared merge column, preview the result, and download a combined CSV.
  </p>

  <input id="fileInput" type="file" multiple accept=".csv,.xlsx" />

  <label for="mergeColumnSelect">Merge column:</label>
  <select id="mergeColumnSelect" disabled>
    <option value="">Select files first</option>
  </select>

  <button id="combineButton">Combine Files</button>
  <button id="downloadButton">Download Combined CSV</button>

  <div id="status"></div>
  <div id="preview"></div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const mergeColumnSelect = document.getElementById("mergeColumnSelect");
    const combineButton = document.getElementById("combineButton");
    const downloadButton = document.getElementById("downloadButton");
    const statusDiv = document.getElementById("status");
    const previewDiv = document.getElementById("preview");

    fileInput.addEventListener("change", async () => {
      const files = fileInput.files;

      previewDiv.innerHTML = "";
      mergeColumnSelect.innerHTML = "";

      if (files.length === 0) {
        mergeColumnSelect.disabled = true;
        mergeColumnSelect.innerHTML = `<option value="">Select files first</option>`;
        statusDiv.textContent = "Please select at least one file.";
        return;
      }

      const formData = new FormData();

      for (const file of files) {
        formData.append("files", file);
      }

      statusDiv.textContent = "Detecting common columns...";
      mergeColumnSelect.disabled = true;
      mergeColumnSelect.innerHTML = `<option value="">Loading...</option>`;

      try {
        const response = await fetch("http://127.0.0.1:8000/columns/common", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }

        const data = await response.json();

        if (data.error) {
          throw new Error(data.error);
        }

        renderMergeColumnOptions(data.common_columns);
      } catch (error) {
        mergeColumnSelect.disabled = true;
        mergeColumnSelect.innerHTML = `<option value="">Could not detect columns</option>`;
        statusDiv.textContent = "Error detecting common columns.";
        previewDiv.innerHTML = `<pre>${error.message}</pre>`;
      }
    });

    combineButton.addEventListener("click", async () => {
      const files = fileInput.files;

      if (files.length === 0) {
        statusDiv.textContent = "Please select at least one file.";
        previewDiv.innerHTML = "";
        return;
      }

      const mergeColumn = mergeColumnSelect.value;

      if (!mergeColumn) {
        statusDiv.textContent = "Please choose a merge column.";
        previewDiv.innerHTML = "";
        return;
      }

      const formData = new FormData();

      for (const file of files) {
        formData.append("files", file);
      }

      formData.append("merge_column", mergeColumn);

      statusDiv.textContent = "Combining files...";
      previewDiv.innerHTML = "";

      try {
        const response = await fetch("http://127.0.0.1:8000/combine", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }

        const data = await response.json();

        if (data.error) {
          throw new Error(data.error);
        }

        const rowCount = data.row_count ?? data.total_rows ?? data.rows ?? data.preview.length;

        statusDiv.textContent = `Combined successfully. Rows: ${rowCount}. Merge column: ${mergeColumn}`;

        renderTable(data.preview);
      } catch (error) {
        statusDiv.textContent = "Error combining files.";
        previewDiv.innerHTML = `<pre>${error.message}</pre>`;
      }
    });

    downloadButton.addEventListener("click", async () => {
      const files = fileInput.files;

      if (files.length === 0) {
        statusDiv.textContent = "Please select at least one file.";
        return;
      }

      const mergeColumn = mergeColumnSelect.value;

      if (!mergeColumn) {
        statusDiv.textContent = "Please choose a merge column.";
        return;
      }

      const formData = new FormData();

      for (const file of files) {
        formData.append("files", file);
      }

      formData.append("merge_column", mergeColumn);

      statusDiv.textContent = "Preparing download...";

      try {
        const response = await fetch("http://127.0.0.1:8000/combine/download", {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }

        const contentType = response.headers.get("content-type") || "";

        if (contentType.includes("application/json")) {
          const data = await response.json();

          if (data.error) {
            throw new Error(data.error);
          }
        }

        const blob = await response.blob();

        const downloadUrl = window.URL.createObjectURL(blob);
        const temporaryLink = document.createElement("a");

        temporaryLink.href = downloadUrl;
        temporaryLink.download = "combined.csv";
        document.body.appendChild(temporaryLink);
        temporaryLink.click();

        temporaryLink.remove();
        window.URL.revokeObjectURL(downloadUrl);

        statusDiv.textContent = "Download ready.";
      } catch (error) {
        statusDiv.textContent = "Error downloading combined file.";
        previewDiv.innerHTML = `<pre>${error.message}</pre>`;
      }
    });

    function renderMergeColumnOptions(columns) {
      mergeColumnSelect.innerHTML = "";

      if (!columns || columns.length === 0) {
        mergeColumnSelect.disabled = true;
        mergeColumnSelect.innerHTML = `<option value="">No common columns found</option>`;
        statusDiv.textContent = "No shared columns found across selected files.";
        return;
      }

      for (const column of columns) {
        const option = document.createElement("option");
        option.value = column;
        option.textContent = column;
        mergeColumnSelect.appendChild(option);
      }

      mergeColumnSelect.disabled = false;
      statusDiv.textContent = `Detected ${columns.length} common column(s). Choose one and combine.`;
    }

    function renderTable(rows) {
      if (!rows || rows.length === 0) {
        previewDiv.innerHTML = "<p>No preview data returned.</p>";
        return;
      }

      const columns = Object.keys(rows[0]);

      let html = "<table>";
      html += "<thead><tr>";

      for (const column of columns) {
        html += `<th>${column}</th>`;
      }

      html += "</tr></thead>";
      html += "<tbody>";

      for (const row of rows) {
        html += "<tr>";

        for (const column of columns) {
          const value = row[column] === null ? "" : row[column];
          html += `<td>${value}</td>`;
        }

        html += "</tr>";
      }

      html += "</tbody></table>";

      previewDiv.innerHTML = html;
    }
  </script>
</body>
</html>
